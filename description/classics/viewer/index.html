<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品 | Test Prepare</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1 id="title">作品名</h1>
    <p id="author">作者</p>

</header>

<main>

    <section class="content">

    <div class="card">
        <h2>📖 本文</h2>
        <div id="original"></div>
    </div>

    <div class="card">
        <h2>💬 現代語訳</h2>
        <div id="translation"></div>
    </div>

    <div class="card">
        <h2>📚 重要語句</h2>
        <div id="words"></div>
    </div>

    <div class="card">
        <h2>📝 品詞・文法</h2>
        <div id="grammar"></div>
    </div>

    <div class="card">
        <h2>⭐ テストポイント</h2>
        <div id="points"></div>
    </div>

</section>
</main>

<script src="script.js"></script>

</body>
</html>
